apiVersion: v1
kind: ConfigMap
metadata:
  name: chatcore-config
data:
  APP_NAME: "ChatCore API"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@chatcore-db:5432/chatcore"
  REDIS_URL: "redis://chatcore-redis:6379/0"
  CELERY_BROKER_URL: "redis://chatcore-redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://chatcore-redis:6379/2"
  QDRANT_URL: "http://chatcore-qdrant:6333"
  QDRANT_COLLECTION_PREFIX: "chatcore_"
  VECTOR_DB_TYPE: "qdrant"
  EMBEDDING_DIMENSION: "1536"
  CHUNK_SIZE: "500"
  CHUNK_OVERLAP: "75"
  TOP_K_RETRIEVAL: "5"
  RATE_LIMIT_PER_MINUTE: "60"
  MAX_SITES_PER_TENANT: "10"
  MAX_CHUNKS_PER_SITE: "100000"
  CORS_ORIGINS: '["http://localhost:3000", "https://app.chatcore.dev"]'
