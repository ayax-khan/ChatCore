apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatcore.fullname" . }}-backend
  labels:
    {{- include "chatcore.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "chatcore.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "chatcore.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}/backend:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: chatcore-config
            - secretRef:
                name: chatcore-secrets
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
