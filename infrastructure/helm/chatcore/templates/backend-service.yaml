apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatcore.fullname" . }}-backend
  labels:
    {{- include "chatcore.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: {{ include "chatcore.name" . }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      name: http
