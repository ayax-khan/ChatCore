apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatcore.fullname" . }}-frontend
  labels:
    {{- include "chatcore.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: {{ include "chatcore.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      name: http
