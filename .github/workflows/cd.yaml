name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/chatcore-backend:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/chatcore-frontend:${{ github.sha }}
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name chatcore-cluster
          kubectl set image deployment/backend backend=${{ steps.login-ecr.outputs.registry }}/chatcore-backend:${{ github.sha }}
          kubectl set image deployment/frontend frontend=${{ steps.login-ecr.outputs.registry }}/chatcore-frontend:${{ github.sha }}
